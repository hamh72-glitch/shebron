<title>مدارس مديرية جنوب الخليل</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Tahoma,Arial,sans-serif;background:linear-gradient(135deg,#1e3c72,#2a5298);min-height:100vh;padding:15px}
.container{max-width:1400px;margin:0 auto}
header{background:#fff;padding:20px;border-radius:15px;box-shadow:0 10px 40px rgba(0,0,0,0.2);text-align:center;margin-bottom:20px}
header h1{color:#1e3c72;font-size:1.8em;margin-bottom:8px}
header p{color:#666;font-size:1em}
.stats{display:flex;justify-content:center;gap:20px;margin-top:12px;flex-wrap:wrap}
.stat-item{background:#f0f4f8;padding:8px 20px;border-radius:20px;color:#1e3c72;font-weight:bold;font-size:0.9em}
.filters{background:#fff;padding:20px;border-radius:15px;box-shadow:0 10px 40px rgba(0,0,0,0.2);margin-bottom:20px;display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px}
.filter-group{display:flex;flex-direction:column}
.filter-group label{color:#1e3c72;font-weight:bold;margin-bottom:6px;font-size:0.9em}
.filter-group input,.filter-group select{padding:10px 12px;border:2px solid #e0e0e0;border-radius:8px;font-size:0.95em;font-family:inherit}
.filter-group input:focus,.filter-group select:focus{outline:none;border-color:#2a5298}
.reset-btn{background:#e74c3c;color:#fff;border:none;padding:10px 25px;border-radius:8px;cursor:pointer;font-size:0.95em;font-weight:bold;align-self:flex-end}
.reset-btn:hover{background:#c0392b}
.schools-container{background:#fff;border-radius:15px;box-shadow:0 10px 40px rgba(0,0,0,0.2);overflow:hidden}
.schools-list{max-height:65vh;overflow-y:auto;padding:8px}
.school-card{border-bottom:1px solid #eee;padding:12px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;align-items:center}
.school-card:hover{background:#f8f9fa}
.school-card:last-child{border-bottom:none}
.school-info h3{color:#1e3c72;font-size:1em;margin-bottom:4px}
.school-info p{color:#666;font-size:0.85em;margin:2px 0}
.region{background:#e8f4f8;color:#1e3c72;padding:2px 10px;border-radius:12px;font-size:0.8em;display:inline-block;margin-top:4px}
.contact-btns{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.call-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 15px;border:none;border-radius:20px;font-size:0.85em;font-weight:bold;text-decoration:none}
.call-btn.national{background:#2a5298;color:#fff}
.call-btn.national:hover{background:#1e3c72}
.call-btn.director{background:#27ae60;color:#fff}
.call-btn.director:hover{background:#219a52}
.call-btn svg{width:16px;height:16px}
.no-results{text-align:center;padding:40px;color:#666}
@media(max-width:900px){.school-card{grid-template-columns:1fr;text-align:center}.contact-btns{justify-content:center;margin-top:10px}}
@media(max-width:600px){header h1{font-size:1.4em}.stats{gap:10px}.stat-item{padding:6px 12px;font-size:0.85em}}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:#f1f1f1}
::-webkit-scrollbar-thumb{background:#2a5298;border-radius:8px}
</style>
</head>

<header>

</div>
</header>
<div class="filters">
<div class="filter-group"><label>المدرسة</label><input type="text" id="sName" placeholder="ابحث..."></div>
<div class="filter-group"><label>المدير</label><input type="text" id="sDir" placeholder="ابحث..."></div>
<div class="filter-group"><label>المنطقة</label><select id="sReg"><option value="">الكل</option></select></div>
<button class="reset-btn" onclick="rst()">إعادة</button>
</div>
<div class="schools-container">
<div class="schools-list" id="list"></div>
</div>
</div>
